# binkd.conf - Vision3 BBS
#
# This is the default binkd configuration template.
# Edit this file to match your FTN network addresses, hub connections,
# and system information and file paths.
#

#
# Domains - first is "Default":
# Add one "domain" line per FTN network you participate in.
# Format: domain <name> <outbound-path> <zone>
#
domain fsxnet /opt/vision3/data/ftn/out 21
domain fidonet /opt/vision3/data/ftn/out 3

#
# Your Addresses:
# Add one "address" line per FTN address assigned to your system.
#
address 21:1/123@fsxnet
address 3:1/456.1@fidonet

#
# General variables for your BBS:
#
sysname "My BBS"
location "Somewhere, USA"
sysop "SysOp"
nodeinfo 9600,TCP,BINKP
oblksize 4096
timeout 60
connect-timeout 0
call-delay 300
rescan-delay 60
maxservers 4
maxclients 1
log /opt/vision3/data/logs/binkd.log
loglevel 4
conlog 4
inbound /opt/vision3/data/ftn/secure_in
inbound-nonsecure /opt/vision3/data/ftn/in
kill-dup-partial-files
kill-old-partial-files 86400
kill-old-bsy 43200
try 2
hold 1800
iport 24554

#
# Hub Systems:
# Add one "node" line per hub you connect to.
# Format: node <hub-address> <hostname>:<port> <password> -
#
node 21:1/100@fsxnet hub.example.com:24554 PASSWORD -
node 3:1/100@fidonet hub.example.com:24554 PASSWORD -

#
# Execute v3mail toss after receiving files:
#
prescan
exec "/opt/vision3/v3mail toss" *.[mwtfsMWTFS][oehrauOEHRAU][0-9a-zA-Z] *.pkt

#
# BinkD additional options:
#
percents
