# DOSBox-X configuration template for Vision/3 BBS door execution.
#
# This file is used as a base template when dosbox_config is set in doors.json.
# The following placeholders are replaced at runtime:
#   {{.Port}}       - TCP port for serial1 nullmodem connection
#   {{.DriveCPath}} - Host path mounted as C: drive
#   {{.NodePath}}   - Per-node temp directory mounted as D: (contains dropfiles)
#
# To use this as a starting point for a custom config, copy it, edit as needed,
# and set dosbox_config to the path of your copy in doors.json.

[sdl]
output=none

[dosbox]
title=Vision3 BBS

[cpu]
core=auto
cputype=486

[memory]
ems=true
xms=true

[mixer]
nosound=true

[midi]
mpu401=none
mididevice=none

[sblaster]
sbtype=none

[gus]
gus=false

[speaker]
pcspeaker=false

[joystick]
joysticktype=none

[serial]
# COM1 connects back to Vision3 via TCP nullmodem. transparent=1 passes raw bytes.
serial1=nullmodem server:127.0.0.1 port:{{.Port}} transparent:1
serial2=disabled
serial3=disabled
serial4=disabled

[autoexec]
# Mount the BBS drive_c as C: and the per-node dropfile directory as D:
MOUNT C {{.DriveCPath}}
MOUNT D {{.NodePath}}
C:
# Run the door via EXTERNAL.BAT (written to D: at launch time)
CALL D:\EXTERNAL.BAT
EXIT
